context:
  version: "1.0.1"
  python_min: "3.11"

package:
  name: diffly
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/diffly/diffly-${{ version }}.tar.gz
  sha256: 14fd0288b5e87785a16cd6f1bcfc5a2fd728e2f18adc5c4cd51cf943458d245e

build:
  python:
    entry_points:
      - diffly = diffly.cli:app
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python >=${{ python_min }}
    - polars >=1.32,<2
    - rich

tests:
  - python:
      python_version: ${{ python_min }}.*
      imports:
        - diffly
      pip_check: true

about:
  homepage: https://pypi.org/project/diffly
  repository: https://github.com/quantco/diffly
  documentation: https://diffly.readthedocs.io/stable
  summary: Utility package for comparing polars dataframes.
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - EgeKaraismailogluQC
    - MariusMerkleQC
    - borchero
